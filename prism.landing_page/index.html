    <link rel="icon" type="image/png" sizes="32x32" href="/src/assets/Images/LogoV2.png" />

    <link rel="icon" type="image/png" sizes="256x256" href="/src/assets/Images/LogoV2.png" />
    <link rel="shortcut icon" href="/src/assets/Images/LogoV2.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/src/assets/Images/LogoV2.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <script>
      const GA_MEASUREMENT_ID = '%VITE_GA_MEASUREMENT_ID%';
      const isLocalhost = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';

      if (GA_MEASUREMENT_ID && !GA_MEASUREMENT_ID.includes('VITE_GA_MEASUREMENT_ID')) {
        const gaScript = document.createElement('script');
        gaScript.async = true;
        gaScript.src = 'https://www.googletagmanager.com/gtag/js?id=' + GA_MEASUREMENT_ID;
        document.head.appendChild(gaScript);

        window.dataLayer = window.dataLayer || [];
        function gtag() { window.dataLayer.push(arguments); }
        window.gtag = gtag;

        gtag('js', new Date());
        gtag('config', GA_MEASUREMENT_ID, {
          send_page_view: true,
          // debug_mode: isLocalhost,
        });
      } else {
        console.warn('GA4 is not initialized. Missing VITE_GA_MEASUREMENT_ID.');
      }
    </script>
    <title>ÊM DẠ MODE</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
